<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Seating Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Kaushan+Script&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e02e14;
    --deep-red: #b8220d;
    --gold: #f0b429;
    --gold-light: #f8d070;
    --cream: #fdf6e3;
    --cream-dim: rgba(253,246,227,0.75);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background-color: var(--red);
    font-family: 'Libre Baskerville', serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Noise texture overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.5;
  }

  /* ── Decorative blobs ── */
  .blob {
    position: fixed;
    border-radius: 60% 40% 55% 45% / 50% 60% 40% 55%;
    background: radial-gradient(ellipse, rgba(240,180,41,0.22) 0%, transparent 68%);
    pointer-events: none;
    z-index: 0;
  }
  .blob-tl { width: 280px; height: 280px; top: -80px; left: -80px; }
  .blob-br { width: 300px; height: 300px; bottom: -90px; right: -90px; border-radius: 45% 55% 40% 60% / 60% 40% 65% 35%; }
  .blob-tr { width: 200px; height: 200px; top: -50px; right: -50px; border-radius: 50% 50% 45% 55% / 55% 45% 60% 40%; }

  /* ── Sticky search header ── */
  .search-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: linear-gradient(180deg, var(--deep-red) 0%, rgba(176,34,13,0.97) 100%);
    border-bottom: 1.5px solid rgba(240,180,41,0.35);
    padding: 20px 24px 18px;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  }

  .search-header h1 {
    font-family: 'Pacifico', cursive;
    color: var(--cream);
    font-size: clamp(2rem, 6vw, 3.2rem);
    text-align: center;
    line-height: 1;
    text-shadow: 2px 3px 0 rgba(0,0,0,0.18);
    margin-bottom: 4px;
  }

  .search-header .tagline {
    font-family: 'Kaushan Script', cursive;
    color: var(--gold);
    text-align: center;
    font-size: clamp(0.85rem, 2.5vw, 1.1rem);
    margin-bottom: 16px;
    opacity: 0.9;
  }

  .search-wrap {
    position: relative;
    max-width: 520px;
    margin: 0 auto;
  }

  .search-wrap input {
    width: 100%;
    padding: 14px 20px 14px 48px;
    border-radius: 50px;
    border: 2px solid rgba(240,180,41,0.5);
    background: rgba(253,246,227,0.1);
    color: var(--cream);
    font-family: 'Libre Baskerville', serif;
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }

  .search-wrap input::placeholder { color: rgba(253,246,227,0.45); }

  .search-wrap input:focus {
    border-color: var(--gold);
    background: rgba(253,246,227,0.15);
    box-shadow: 0 0 0 4px rgba(240,180,41,0.18);
  }

  .search-icon {
    position: absolute;
    left: 17px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--gold);
    font-size: 1.1rem;
    pointer-events: none;
  }

  .clear-btn {
    position: absolute;
    right: 14px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(253,246,227,0.5);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    display: none;
    padding: 4px;
    transition: color 0.2s;
  }
  .clear-btn:hover { color: var(--gold); }
  .clear-btn.visible { display: block; }

  /* ── Search results dropdown ── */
  .search-results {
    position: absolute;
    top: calc(100% + 8px);
    left: 0; right: 0;
    background: var(--deep-red);
    border: 1.5px solid rgba(240,180,41,0.4);
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.35);
    display: none;
    z-index: 200;
    max-height: 280px;
    overflow-y: auto;
  }
  .search-results.open { display: block; }

  .result-item {
    padding: 12px 20px;
    cursor: pointer;
    border-bottom: 1px solid rgba(240,180,41,0.1);
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .result-item:last-child { border-bottom: none; }
  .result-item:hover { background: rgba(240,180,41,0.12); }

  .result-name {
    color: var(--cream);
    font-size: 0.92rem;
  }
  .result-name mark {
    background: none;
    color: var(--gold-light);
    font-weight: 700;
  }

  .result-table {
    font-family: 'Kaushan Script', cursive;
    color: var(--gold);
    font-size: 0.85rem;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .no-results {
    padding: 18px 20px;
    color: rgba(253,246,227,0.5);
    font-style: italic;
    font-size: 0.9rem;
    text-align: center;
  }

  /* ── Main content ── */
  .content {
    position: relative;
    z-index: 1;
    padding: 40px 20px 80px;
    max-width: 1300px;
    margin: 0 auto;
  }

  /* ── Table groups ── */
  /* ── Row section labels ── */
  .row-section {
    margin-bottom: 32px;
  }

  .row-label {
    font-family: 'Kaushan Script', cursive;
    color: var(--gold);
    font-size: 1.1rem;
    opacity: 0.6;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
    padding-left: 4px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .row-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, rgba(240,180,41,0.3), transparent);
  }

  .tables-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
    gap: 22px;
  }

  /* ── Head table special styling ── */
  .head-table-wrap {
    margin-bottom: 36px;
  }

  .head-table-card {
    background: rgba(240,180,41,0.1);
    border: 2px solid rgba(240,180,41,0.65);
    border-radius: 20px;
    padding: 24px 24px 20px;
    position: relative;
    overflow: hidden;
    max-width: 100%;
  }

  .head-table-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(circle, rgba(240,180,41,0.2) 0%, transparent 70%);
  }

  .head-table-card .table-label {
    font-size: 2rem;
    margin-bottom: 6px;
  }

  .head-table-card .table-meta {
    margin-bottom: 16px;
  }

  .head-table-card .guest-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 0 16px;
  }

  .table-card {
    background: rgba(0,0,0,0.12);
    border: 1.5px solid rgba(240,180,41,0.3);
    border-radius: 16px;
    padding: 20px 18px 16px;
    transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    position: relative;
    overflow: hidden;
  }

  .table-card::before {
    content: '';
    position: absolute;
    top: -20px; right: -20px;
    width: 80px; height: 80px;
    background: radial-gradient(circle, rgba(240,180,41,0.14) 0%, transparent 70%);
  }

  .table-card.highlighted {
    border-color: var(--gold);
    background: rgba(240,180,41,0.08);
    box-shadow: 0 0 0 3px rgba(240,180,41,0.25), 0 8px 28px rgba(0,0,0,0.25);
    transform: translateY(-3px);
  }

  .table-label {
    font-family: 'Kaushan Script', cursive;
    color: var(--gold);
    font-size: 1.55rem;
    line-height: 1;
    margin-bottom: 4px;
  }

  .table-meta {
    font-size: 0.68rem;
    color: rgba(253,246,227,0.4);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 14px;
  }

  .guest-list {
    list-style: none;
  }

  .guest-list li {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    border-bottom: 1px solid rgba(240,180,41,0.1);
    transition: background 0.2s;
  }
  .guest-list li:last-child { border-bottom: none; }

  .guest-list li::before {
    content: '◆';
    color: var(--gold);
    font-size: 0.4rem;
    flex-shrink: 0;
    opacity: 0.6;
  }

  .guest-name {
    color: var(--cream);
    font-size: 0.87rem;
    line-height: 1.3;
    transition: color 0.2s;
  }

  .guest-list li.match .guest-name {
    color: var(--gold-light);
    font-weight: 700;
  }

  .guest-list li.match::before {
    opacity: 1;
    font-size: 0.55rem;
    color: var(--gold-light);
  }

  /* ── Footer ── */
  .footer {
    text-align: center;
    margin-top: 56px;
    position: relative;
    z-index: 1;
    padding-bottom: 20px;
  }
  .footer-icon { font-size: 2.2rem; display: block; margin-bottom: 6px; }
  .footer p {
    font-family: 'Kaushan Script', cursive;
    color: var(--gold);
    font-size: 1.1rem;
    opacity: 0.8;
  }

  /* ── Scroll-to highlight animation ── */
  @keyframes pulse-card {
    0%   { box-shadow: 0 0 0 0 rgba(240,180,41,0.5); }
    50%  { box-shadow: 0 0 0 10px rgba(240,180,41,0); }
    100% { box-shadow: 0 0 0 0 rgba(240,180,41,0); }
  }
  .table-card.pulse {
    animation: pulse-card 0.9s ease-out 2;
  }

  /* Scrollbar */
  .search-results::-webkit-scrollbar { width: 6px; }
  .search-results::-webkit-scrollbar-track { background: transparent; }
  .search-results::-webkit-scrollbar-thumb { background: rgba(240,180,41,0.4); border-radius: 3px; }
</style>
</head>
<body>

<div class="blob blob-tl"></div>
<div class="blob blob-br"></div>
<div class="blob blob-tr"></div>

<!-- ── Sticky Search Header ── -->
<div class="search-header">
  <h1>seating chart</h1>
  <p class="tagline">type your name to find your table ✦</p>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search your name…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" aria-label="Clear search">✕</button>
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<!-- ── Seating Tables ── -->
<div class="content">
  <div class="tables-grid" id="tablesGrid"></div>
  <div class="footer">
    <span class="footer-icon">🧁</span>
    <p>enjoy the desserts & the dancing!</p>
  </div>
</div>

<script>
// ── Guest Data ──────────────────────────────────────────

const headTable = {
  id: "head",
  label: "Head Table & Table 25",
  guests: ["Isabella","James","Heidi","Dave","Ramon","Carrie","Mildred","Samantha","Dan","Annie","Andy"]
};

const rows = [
  {
    label: "Row 1",
    tables: [
      { num: 2,  guests: ["Enrique","Mariana","Saray","Frida","Ellie","Vivian","Jishing","Mickey"] },
      { num: 3,  guests: ["Anoud","Soham","Eddie","Danyal","Jiss","Zihao","Connie","Annanya","Lisa"] },
      { num: 4,  guests: ["Ben","Ashley","Jason","Mia","Kristen","Ben","Nathan"] },
      { num: 5,  guests: ["Jake","Drew","Garrett","Natalie","Ryan","Kendall","Nico","Lydia"] },
    ]
  },
  {
    label: "Row 2",
    tables: [
      { num: 6,  guests: ["Grandma","Amy","Bob","Ken","Chia"] },
      { num: 7,  guests: ["Courtney","Greg","Seamus","Gene","Barbara","Kim","Deborah","Ben"] },
      { num: 8,  guests: ["Rick","Sue","Sydney","Hallie","Gabe","Steve","Laura","Jen","Lindsay","Tyler"] },
      { num: 9,  guests: ["Brent","Max","CJ","Nate","Owen","Carson","Brayden","Trevin"] },
    ]
  },
  {
    label: "Row 3",
    tables: [
      { num: 10, guests: ["Mark","Celeste","Zachary","Megan","Courtney","Stella","Austin"] },
      { num: 11, guests: ["Mayra","Saul","Rene","Edith","Mirel","Alderan","Sebastian","Esteban","Emiliano"] },
      { num: 12, guests: ["Raymundo","Clarin","Mumo","Alejandra","Abran","Danny","Carol","Angel","Olivia"] },
      { num: 13, guests: ["Carlitos","Carolina","Gustavo","Carlos","Blanca","Monica","Diego","Yaretzi","Gilberto","Arruan"] },
    ]
  },
  {
    label: "Row 4",
    tables: [
      { num: 14, guests: ["Luisito","Eliana","Luis","Jill","Sofia","Daniel","Holly","Mike","Julia"] },
      { num: 15, guests: ["Daren","Victoria","Mimi","Andy","Kris","Trish","Dave"] },
      { num: 16, guests: ["Cora","Dane","Tyler","Megan","Bennett","Claire","Gauge"] },
      { num: 17, guests: ["Alissa","Dan","Jonathan","Maia","Jeff","Corey","Joe"] },
    ]
  },
  {
    label: "Row 5",
    tables: [
      { num: 18, guests: ["Carol","Lucia","Amy","Scott","Mandalit","Amaya","Pablo","Noemi","Shannon"] },
      { num: 19, guests: ["Deina","Robert","Katy","John","Julie","Charles","Bobbi","Brandon"] },
      { num: 20, guests: ["Natalie","Dustin","Chris","Valerie","Andrew","Hannah"] },
      { num: 21, guests: ["Jodi","Mike","Rhonda","Brad","Heidi","Mike"] },
    ]
  },
  {
    label: "Row 6",
    tables: [
      { num: 22, guests: ["Connor","Audrey","Colleen","Lauren","Mike","Hayley","Delaney"] },
      { num: 23, guests: ["Kellie","Terry","Melissa","John","Cheryl","Frank"] },
      { num: 24, guests: ["Lisa","Phil","Laura","Kirk","Leann","Tom"] },
    ]
  },
];

// ── Build flat guest index ──
const guestIndex = [];
headTable.guests.forEach(name => guestIndex.push({ name, tableId: "head", tableLabel: "Head Table & Table 25" }));
rows.forEach(row => {
  row.tables.forEach(t => {
    t.guests.forEach(name => guestIndex.push({ name, tableId: `table-${t.num}`, tableLabel: `Table ${t.num}` }));
  });
});

// ── Render ──
const grid = document.getElementById('tablesGrid');

// Head table
const headWrap = document.createElement('div');
headWrap.className = 'head-table-wrap';
const headCard = document.createElement('div');
headCard.className = 'table-card head-table-card';
headCard.id = 'head';
headCard.innerHTML = `
  <div class="table-label">♛ Head Table &amp; Table 25</div>
  <div class="table-meta">${headTable.guests.length} guests</div>
  <ul class="guest-list">
    ${headTable.guests.map(g => `<li data-name="${g.toLowerCase()}"><span class="guest-name">${g}</span></li>`).join('')}
  </ul>
`;
headWrap.appendChild(headCard);
grid.appendChild(headWrap);

// Row sections
rows.forEach(row => {
  const section = document.createElement('div');
  section.className = 'row-section';
  section.innerHTML = `<div class="row-label">${row.label}</div>`;
  const rowGrid = document.createElement('div');
  rowGrid.className = 'tables-grid';
  row.tables.forEach(t => {
    const card = document.createElement('div');
    card.className = 'table-card';
    card.id = `table-${t.num}`;
    card.innerHTML = `
      <div class="table-label">Table ${t.num}</div>
      <div class="table-meta">${t.guests.length} guests</div>
      <ul class="guest-list">
        ${t.guests.map(g => `<li data-name="${g.toLowerCase()}"><span class="guest-name">${g}</span></li>`).join('')}
      </ul>
    `;
    rowGrid.appendChild(card);
  });
  section.appendChild(rowGrid);
  grid.appendChild(section);
});

// ── Search logic ──
const input = document.getElementById('searchInput');
const resultsBox = document.getElementById('searchResults');
const clearBtn = document.getElementById('clearBtn');

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function highlight(text, query) {
  const re = new RegExp(`(${escapeRegex(query)})`, 'gi');
  return text.replace(re, '<mark>$1</mark>');
}

function clearHighlights() {
  document.querySelectorAll('.table-card').forEach(c => {
    c.classList.remove('highlighted','pulse');
  });
  document.querySelectorAll('.guest-list li').forEach(li => {
    li.classList.remove('match');
    li.querySelector('.guest-name').textContent = li.dataset.name.replace(/(^\w|\s\w)/g, m => m.toUpperCase());
  });
}

function restoreNames() {
  document.querySelectorAll('.guest-list li').forEach(li => {
    const raw = li.dataset.name;
    const proper = raw.replace(/(^\w|\s\w)/g, m => m.toUpperCase());
    li.querySelector('.guest-name').textContent = proper;
    li.classList.remove('match');
  });
}

input.addEventListener('input', () => {
  const q = input.value.trim();
  clearBtn.classList.toggle('visible', q.length > 0);

  if (q.length < 2) {
    resultsBox.classList.remove('open');
    clearHighlights();
    return;
  }

  const matches = guestIndex.filter(g =>
    g.name.toLowerCase().includes(q.toLowerCase())
  ).slice(0, 12);

  if (matches.length === 0) {
    resultsBox.innerHTML = '<div class="no-results">No guests found — check the spelling?</div>';
  } else {
    resultsBox.innerHTML = matches.map(m => `
      <div class="result-item" data-tableid="${m.tableId}" data-name="${m.name}">
        <span class="result-name">${highlight(m.name, q)}</span>
        <span class="result-table">${m.tableLabel}</span>
      </div>
    `).join('');
    resultsBox.querySelectorAll('.result-item').forEach(item => {
      item.addEventListener('click', () => {
        selectGuest(item.dataset.name, item.dataset.tableid);
      });
    });
  }
  resultsBox.classList.add('open');
});

function selectGuest(name, tableId) {
  input.value = name;
  resultsBox.classList.remove('open');
  clearBtn.classList.add('visible');

  clearHighlights();

  const card = document.getElementById(tableId);
  if (!card) return;
  card.classList.add('highlighted');

  card.querySelectorAll('.guest-list li').forEach(li => {
    if (li.dataset.name === name.toLowerCase()) li.classList.add('match');
  });

  const headerH = document.querySelector('.search-header').offsetHeight;
  const top = card.getBoundingClientRect().top + window.scrollY - headerH - 20;
  window.scrollTo({ top, behavior: 'smooth' });

  setTimeout(() => card.classList.add('pulse'), 600);
}

clearBtn.addEventListener('click', () => {
  input.value = '';
  clearBtn.classList.remove('visible');
  resultsBox.classList.remove('open');
  clearHighlights();
  input.focus();
});

// Close dropdown on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.search-wrap')) {
    resultsBox.classList.remove('open');
  }
});

// Keyboard navigation in results
input.addEventListener('keydown', e => {
  const items = resultsBox.querySelectorAll('.result-item');
  const focused = resultsBox.querySelector('.result-item:focus');
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    (focused ? focused.nextElementSibling || items[0] : items[0])?.focus();
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    (focused ? focused.previousElementSibling || items[items.length-1] : items[items.length-1])?.focus();
  } else if (e.key === 'Escape') {
    resultsBox.classList.remove('open');
    input.blur();
  }
});

resultsBox.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const focused = resultsBox.querySelector('.result-item:focus');
    if (focused) selectGuest(focused.dataset.name, focused.dataset.tableid);
  }
});
</script>
</body>
</html>
